<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de recados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container"/>
    <h1> Quadro de Recados</h1>
    <p class = "subtitulo">Frontend + Backend + Docker Compose</p>
    
    <form id = "form-recado">
        <input 
        type = "text"
        id = "texto"
        placeholder = "Digite um recado"
        required
        />
        <button type = "submit">Enviar</button>
        </form>

    </div class = "acoes">
        <button id="btn-atualizar">Atualizar lista</button>
    </div>
    <h2>Recados</h2>
        <ul id = "Lista-recados"></ul>
        <p id="mensagem"></p>
    </div>
    <script src="script.js"></script>
    </body>
</html>
